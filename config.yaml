paths:
  train_data: data/raw/application_train.csv
  test_data: data/raw/application_test.csv
  processed_train: data/processed/train_processed.csv
  model_output: models/xgboost_model.pkl

model:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  scale_pos_weight: 11       # handles class imbalance
  eval_metric: auc
  early_stopping_rounds: 50
  random_state: 42

training:
  test_size: 0.2
  cv_folds: 5
